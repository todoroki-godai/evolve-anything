[pytest]
# importlib モードを使用して同名テストファイルの module collision を防ぐ
# (test_backfill.py と test_telemetry.py が複数ディレクトリに存在するため)
addopts = --import-mode=importlib -n auto
# bare `python3 -m pytest` で全件収集するための testpaths（#468）。
# canonical コマンドへのパス列挙依存を断ち、scripts/lib/tests（1111件）の取りこぼしを根治する。
# 漏れの再発は audit の Testpaths Coverage チェック（scripts/lib/testpaths_coverage.py）が検出する。
testpaths = hooks skills scripts/tests scripts/rl/tests scripts/lib/tests bin/tests
markers =
    bench: live API calls via haiku (run with: pytest -m bench)
    bench_ingest: real-PJ token_usage ingest perf bench (run with: pytest -m bench_ingest)
